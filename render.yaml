services:
  - type: web
    name: mindful-digital-soul-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: MODEL_PATH
        value: ./student_depression_best_model.pkl
      - key: ALLOWED_ORIGINS
        value: https://ishkashyap.github.io
